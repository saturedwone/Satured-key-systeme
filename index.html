            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        /* Contenedores de las distintas vistas */

        .active { display: flex; }
        
        h1 { font-size: 28px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #aaa; margin-bottom: 30px; }

        /* Estilos de Botones y Textbox */
        button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-white { background-color: #fff; color: #000; }
        .btn-white:hover { background-color: #ddd; }
        
        .btn-yellow { background-color: #ffcc00; color: #000; margin-top: 15px; }
        .btn-yellow:hover { background-color: #e6b800; }
        
        .btn-copy { background-color: #333; color: #fff; width: 100%; max-width: 300px; margin-top: 10px; }
        .btn-copy:hover { background-color: #555; }

        input[type="text"] {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            font-size: 16px;
            text-align: center;
            background-color: #111;
            color: #00ff00;
            border: 2px solid #333;
            border-radius: 8px;
            outline: none;
            user-select: all;
        }
        
        #timer { font-size: 20px; font-weight: bold; color: #ff00ff; margin-top: 20px; }
        .error-text { color: #ff5555; font-size: 20px; }
    </style>

        // Función para cambiar de vistas
        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Lógica de inicio
        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const isVerified = urlParams.get('verified') === 'true';
            const savedData = JSON.parse(localStorage.getItem('satured_key_data'));
            const currentTime = new Date().getTime();

            // 1. Si ya tiene una key y no ha expirado, mostrarla directo
            if (savedData && savedData.expireTime > currentTime) {
                showKeyView(savedData.key, savedData.expireTime);
                return;
            }

            // 2. Si no tiene key, verificar si pasó el linkvertise
            if (isVerified) {
                showView('view-main');
            } else {
                // Si entró directo y no tiene key, se bloquea
                showView('view-blocked');
            }
        }

        // Cuando tocan el botón blanco GET KEY
        function generateKey() {
            // Elegir key aleatoria
            const randomKey = keysList[Math.floor(Math.random() * keysList.length)];
            
            // Tiempo: Ahora + 24 horas (en milisegundos)
            const expireTime = new Date().getTime() + (24 * 60 * 60 * 1000);
            
            // Guardar en la memoria del navegador local
            localStorage.setItem('satured_key_data', JSON.stringify({
                key: randomKey,
                expireTime: expireTime
            }));

            // Cambiar la URL visualmente para despistar (Añade un ID falso)
            const randomID = Math.random().toString(36).substring(2, 15);
            window.history.pushState("object or string", "Title", "?id=" + randomID);

            showKeyView(randomKey, expireTime);
        }

        // Mostrar la vista de la Key y empezar el contador
        function showKeyView(key, expireTime) {
            document.getElementById('key-textbox').value = key;
            showView('view-key');
            startTimer(expireTime);
        }

        // Botón de Copiar
        function copyKey() {
            const copyText = document.getElementById('key-textbox');
            copyText.select();
            copyText.setSelectionRange(0, 99999); // Para móviles
            document.execCommand("copy");
            
            const btn = document.querySelector('.btn-copy');
            btn.innerText = "COPIED!";
            setTimeout(() => { btn.innerText = "COPY"; }, 2000);
        }

        // Sistema del contador regresivo 24H
        let timerInterval;
        function startTimer(expireTime) {
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(function() {
                const now = new Date().getTime();
                const distance = expireTime - now;

                if (distance < 0) {
                    clearInterval(timerInterval);
                    localStorage.removeItem('satured_key_data');
                    window.location.href = window.location.pathname; // Recargar página
                    return;
                }

                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                // Formato 00:00:00
                document.getElementById("timer").innerHTML = 
                    (hours < 10 ? "0" + hours : hours) + "h " + 
                    (minutes < 10 ? "0" + minutes : minutes) + "m " + 
                    (seconds < 10 ? "0" + seconds : seconds) + "s remaining";
            }, 1000);
        }
